<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .progress { width: 100%; background-color: #f3f3f3; }
        .progress-bar { height: 20px; width: 0; background-color: #4caf50; }
        .container { margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>Survey</h1>
    <div class="progress">
        <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div class="container">
        <h2>Section 1</h2>
        <form id="survey-form">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required><br><br>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required><br><br>
            <button type="button" onclick="nextSection(1)">Next</button>
        </form>
    </div>
    <div class="container" style="display: none;">
        <h2>Section 2</h2>
        <form>
            <label for="feedback">Feedback:</label>
            <textarea id="feedback" name="feedback" rows="4" required></textarea><br><br>
            <button type="button" onclick="submitSurvey()">Submit</button>
        </form>
    </div>
    <script>
        let currentSection = 0;
        const sections = document.querySelectorAll('.container');
        const progressBar = document.getElementById('progress-bar');

        function nextSection(section) {
            sections[section - 1].style.display = 'none';
            currentSection = section;
            sections[section].style.display = 'block';
            updateProgress();
            autoScroll();
        }

        function updateProgress() {
            const progress = ((currentSection + 1) / sections.length) * 100;
            progressBar.style.width = progress + '%';
        }

        function autoScroll() {
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function submitSurvey() {
            alert('Survey submitted!');
            // Here you can add logic to send the data to the server
        }
    </script>
</body>
</html>
